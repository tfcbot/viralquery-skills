interface:
  display_name: "ViralQuery"
  short_description: "Find top organic viral videos for mobile apps"
  default_prompt: "Use $viralquery to find the top organic viral videos for my app, return source links, and say if it is not covered yet."
dependencies:
  tools:
    - type: "mcp"
      value: "viralquery"
      description: "ViralQuery remote MCP server"
      transport: "streamable_http"
      url: "https://viralquery.com/mcp"
policy:
  allow_implicit_invocation: true
