version: "1.0.3"
interface:
  display_name: "ViralQuery"
  short_description: "Read-only app video research for agents"
  default_prompt: "Use $viralquery to check whether my app is covered and return its top organic video results with source links."
dependencies:
  tools:
    - type: "mcp"
      value: "viralquery"
      description: "Protected read-only ViralQuery remote MCP"
      transport: "streamable_http"
      url: "https://viralquery.com/mcp"
policy:
  allow_implicit_invocation: true
