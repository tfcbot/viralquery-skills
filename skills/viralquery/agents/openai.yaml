version: "1.0.4"
interface:
  display_name: "ViralQuery"
  short_description: "Retrieve mobile-app viral videos by ID"
  default_prompt: "Use $viralquery to get the viral videos for this mobile app and include their source links."
dependencies:
  tools:
    - type: "mcp"
      value: "viralquery"
      description: "Protected read-only ViralQuery remote MCP"
      transport: "streamable_http"
      url: "https://viralquery.com/mcp"
policy:
  allow_implicit_invocation: true
