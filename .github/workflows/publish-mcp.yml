name: Publish MCP metadata

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate metadata JSON
        run: python3 -m json.tool server.json >/dev/null

      - name: Validate the published skill
        run: npx --yes skills@1.5.17 add . --list

      - name: Download and verify official MCP publisher v1.7.9
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" \
            -o mcp-publisher_linux_amd64.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher_linux_amd64.tar.gz" \
            | sha256sum -c -
          tar -xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher
          chmod 755 mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to the official MCP Registry
        run: ./mcp-publisher publish
